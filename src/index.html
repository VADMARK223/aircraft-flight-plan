<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D3 tutorial</title>
    <script src="http://d3js.org/d3.v7.min.js"></script>
</head>
<body>
<script>
    const data = [20, 40, 50, 60]
    const width = 500
    const height = 500

    const widthScale = d3.scaleLinear().domain([0, 60]).range([0, width])
    const color = d3.scaleLinear().domain([0, 60]).range(['red', 'blue'])

    const canvas = d3.select("body")
        .append("svg")
        .attr('width', width)
        .attr('height', height);

    const bars = canvas
        .selectAll('rect')
        .data(data)
        .enter()
        .append('rect')
        .attr('fill', function (datum) {
            return color(datum)
        })
        .attr('y', function (datum, index) {
            return index * 60
        })
        .attr('width', function (datum) {
            return widthScale(datum)
        })
        .attr('height', 50)

    // const circle = canvas.append('circle')

    //     .attr('fill', 'blue');

</script>
</body>
</html>
