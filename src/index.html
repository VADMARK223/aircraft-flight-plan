<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>План полетов воздушных судов</title>
    <script src="http://d3js.org/d3.v7.min.js"></script>
</head>
<body style="margin: 0">
<script>
    const data = [40, 20, 50, 60]
    const topPadding = 20 // Отступ сверху
    const sidePadding = 20 // Отступ по бокам
    const width = 500
    const height = 500
    const widthScale = d3.scaleLinear().domain([0, 60]).range([0, width - 2 * sidePadding])
    const color = d3.scaleLinear().domain([0, 60]).range(['red', 'blue'])

    // Канвас
    const svg = d3.select("body")
        .append("svg")
        .attr('width', width)
        .attr('height', height)

    // Графики
    svg.append('g')
        .attr('transform', `translate(${sidePadding}, ${topPadding})`)
        .selectAll('rect')
        .data(data)
        .enter()
        .append('rect')
        .attr('fill', function (datum) {
            return color(datum)
        })
        .attr('y', function (datum, index) {
            return index * 60
        })
        .attr('width', function (datum) {
            return widthScale(datum)
        })
        .attr('height', 50)

    // Основная ось
    const mainAxis = d3.axisBottom().scale(widthScale).ticks(5)
    svg.append('g')
        .attr('transform', `translate(${sidePadding}, 260)`)
        .call(mainAxis)

    svg.append('text')
        .attr('x', sidePadding)
        .attr('y', 5)
        .attr('fill', 'black')
        .attr('text-anchor', 'start')
        .attr('dominant-baseline', 'hanging')
        .text('ПЛАН ПОЛЕТОВ ВОЗДУШНЫХ СУДОВ')

    /*canvas.append('g').append('circle')
        .attr('cx', 250)
        .attr('cy', 250)
        .attr('r', 50)
        .attr('fill', 'blue');

    canvas.append('g').append('rect')
        .attr('width', 100)
        .attr('height', 50);*/
</script>
</body>
</html>
