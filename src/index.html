<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D3 tutorial</title>
    <script src="http://d3js.org/d3.v7.min.js"></script>
</head>
<body style="margin: 0">
<script>
    const data = [40, 20, 50, 60]
    const topPadding = 20 // Отступ сверху
    const sidePadding = 20 // Отступ по бокам
    const width = 500
    const height = 500
    const widthScale = d3.scaleLinear().domain([0, 60]).range([0, width - 2 * sidePadding])
    const color = d3.scaleLinear().domain([0, 60]).range(['red', 'blue'])

    const mainAxis = d3.axisBottom().scale(widthScale).ticks(5)

    const canvas = d3.select("body")
        .append("svg")
        .attr('width', width)
        .attr('height', height)
        .append('g')
        .attr('transform', `translate(${sidePadding}, ${topPadding})`)

    canvas.selectAll('rect')
        .data(data)
        .enter()
        .append('rect')
        .attr('fill', function (datum) {
            return color(datum)
        })
        .attr('y', function (datum, index) {
            return index * 60
        })
        .attr('width', function (datum) {
            return widthScale(datum)
        })
        .attr('height', 50)

    canvas.append('g')
        .call(mainAxis)
        .attr('transform', `translate(0, 250)`)
</script>
</body>
</html>
